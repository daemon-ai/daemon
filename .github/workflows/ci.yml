name: ci

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The wire contract: prove the generated C codec round-trips real ciborium bytes, and that
  # daemon-app's vendored copy matches what the pinned daemon-node contract generates.
  codec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v15
        with:
          name: daemon-ai
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: cddl parity (the one authoritative CDDL covers every Rust wire variant)
        run: cd daemon-node && nix develop --command cargo run -p xtask -- cddl
      - name: verify-codec (zcbor C decoder accepts real ciborium fixtures)
        run: cd daemon-node && nix build ".#checks.x86_64-linux.verify-codec" -L
      - name: cddl-cat conformance (serde wire bytes validate against the CDDL, pos + neg)
        run: cd daemon-node && nix develop --command cargo test -p daemon-api --test conformance
      - name: proptest conformance (arbitrary values across every variant validate against the CDDL)
        run: cd daemon-node && nix develop --command cargo test -p daemon-api --features arbitrary --test conformance_proptest
      - name: codec-drift (vendored codec + runtime vs generated)
        run: nix build ".?submodules=1#checks.x86_64-linux.codec-drift" -L

  # daemon-node's own gate: build the host + CLI and run the workspace tests.
  daemon-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v15
        with:
          name: daemon-ai
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: build daemon + daemon-cli
        run: cd daemon-node && nix build ".#daemon" ".#daemon-cli" -L
      - name: workspace tests
        run: cd daemon-node && nix develop --command cargo test --workspace

  # daemon-app's own gate: build both frontends (packaged) and run the Qt/CTest suite headless.
  daemon-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v15
        with:
          name: daemon-ai
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: build GUI + TUI (packaged)
        run: |
          nix build ./daemon-app#default --out-link result-app -L
          nix build ./daemon-app#tui --out-link result-tui -L
      - name: Qt/CTest suite (headless, GUI + TUI)
        run: |
          cd daemon-app
          nix develop --command bash -c '
            set -e
            cmake -B build-ci -G Ninja -DBUILD_TESTING=ON -DDAEMON_APP_TUI=ON \
              -DMD4QT_SOURCE_DIR="$MD4QT_SOURCE_DIR" -DEARCUT_SOURCE_DIR="$EARCUT_SOURCE_DIR" \
              -DKSYNTAXHIGHLIGHTING_SOURCE_DIR="$KSYNTAXHIGHLIGHTING_SOURCE_DIR" -DMICROTEX_SOURCE_DIR="$MICROTEX_SOURCE_DIR" \
              -DQWINDOWKIT_SOURCE_DIR="$QWINDOWKIT_SOURCE_DIR" -DQSIMPLEUPDATER_SOURCE_DIR="$QSIMPLEUPDATER_SOURCE_DIR" \
              -DQAUTOSTART_SOURCE_DIR="$QAUTOSTART_SOURCE_DIR" -DQXTGLOBALSHORTCUT_SOURCE_DIR="$QXTGLOBALSHORTCUT_SOURCE_DIR"
            cmake --build build-ci
            QT_QPA_PLATFORM=offscreen ctest --test-dir build-ci --output-on-failure
          '
      - name: C++ static analysis (clang-format + clang-tidy + qmllint, diff-scoped)
        # DIFF-SCOPED: master history has already been gated, so analyze only the files this
        # change touches (vs the merge-base with origin/master). Whole-tree analysis is reserved
        # for the manual `just lint-all`; it is deliberately wired into NO workflow — a full
        # clang-tidy pass re-frontends every TU at full parallelism and must never be an
        # every-push cost. If the merge-base cannot be resolved (fresh clone shapes), fall back
        # to the full file list — runner-local and bounded, never silently green.
        run: |
          cd daemon-app
          nix develop --command bash -euo pipefail -c '
            base=$(git merge-base HEAD origin/master 2>/dev/null || true)
            if [ -n "$base" ]; then
              changed=$(git diff --name-only "$base" HEAD)
            else
              echo "note: no merge-base with origin/master; falling back to the full file list"
              changed=$(git ls-files)
            fi
            cpp_all=$(printf "%s\n" "$changed" | grep -E "^(src|tests)/.*\.(cpp|h)$" || true)
            cpp_tus=$(printf "%s\n" "$changed" | grep -E "^src/.*\.cpp$" || true)
            qml=$(printf "%s\n" "$changed" | grep -E "\.(qml|js)$" || true)
            echo "== clang-format (changed) =="
            printf "%s\n" "$cpp_all" | xargs -r clang-format --dry-run --Werror
            echo "== clang-tidy (changed, WarningsAsErrors) =="
            printf "%s\n" "$cpp_tus" | xargs -r -P"$(nproc)" -n1 clang-tidy -p build-ci --quiet
            if [ -n "$qml" ]; then
              echo "== qmllint =="
              qmllint_status=0
              while IFS= read -r -d "" rsp; do qmllint @"$rsp" || qmllint_status=1; done \
                < <(find build-ci -path "*/.rcc/qmllint/*_module.rsp" -print0)
              [ "$qmllint_status" -eq 0 ]
            else
              echo "== qmllint: no QML changes — skipped =="
            fi
          '

  # Static-analysis gates mirroring the local `just lint` (DIFF-SCOPED — see the justfile).
  # Blocking: the Rust and secret/spell scans are all clean as of this commit. The C++
  # clang-tidy/clang-format/qmllint gate runs (blocking, diff-scoped) in the daemon-app job
  # above, reusing its build-ci compile database. CI never runs the whole-tree `lint-all`:
  # master history has already been gated commit-by-commit, so only the delta needs analysis.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # Full history so the child repos' merge-base with origin/master resolves for the
          # diff-scoped lint recipes.
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v15
        with:
          name: daemon-ai
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: rustfmt + clippy (-D warnings, diff-scoped)
        run: nix run nixpkgs#just -- lint-rust-diff
      - name: cargo-deny (advisories / licenses / bans / sources)
        run: nix run nixpkgs#just -- deny
      - name: gitleaks (secret scan)
        run: nix run nixpkgs#just -- secrets
      - name: typos (spell check)
        run: nix run nixpkgs#just -- spell

  # The cross-repo end-to-end suite, run against the exact binaries built above.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v15
        with:
          name: daemon-ai
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: build daemon binaries (debug)
        run: cd daemon-node && nix develop --command cargo build -p daemon -p daemon-cli
      - name: build client frontends
        run: |
          nix build ./daemon-app#default --out-link result-app -L
          nix build ./daemon-app#tui --out-link result-tui -L
      - name: run system-tests
        run: |
          export DAEMON_BIN="$PWD/daemon-node/target/debug/daemon"
          export DAEMON_CLI_BIN="$PWD/daemon-node/target/debug/daemon-cli"
          export CLIENT_GUI_BIN="$PWD/result-app/bin/daemon-app"
          export CLIENT_TUI_BIN="$PWD/result-tui/bin/daemon-tui"
          cd system-tests && nix develop ../daemon-node --command cargo test -- --test-threads=1
      - name: upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            system-tests/target/nextest/**
            result-app/**/*.png
          if-no-files-found: ignore
          retention-days: 7
