name: release

# Tag-triggered release pipeline: build every currently-buildable installer, sign the update feed
# with minisign, and publish everything to GitHub Releases. `just release .` (scripts/release.sh)
# cuts the annotated `vX.Y.Z` tag that fires this. workflow_dispatch runs the same build + manifest
# generation for validation but skips the GitHub Release creation (no tag to publish against).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Linux installers (deb / rpm / AppImage + sidecars) and the portable .tar.zst, app+node bundle
  # embedded (superproject package-linux / package-portable-tarball).
  linux:
    runs-on: ubuntu-latest
    # Map the Sentry auth token into the job env so the (optional) symbol-upload step can gate on
    # its presence — a fork / secret-less dispatch run simply skips it (never fails).
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: daemon-ai
      SENTRY_PROJECT: daemon
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v15
        with:
          name: daemon-ai
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build Linux installers + portable tarball
        run: |
          nix build ".?submodules=1#package-linux" --out-link result-linux -L --accept-flake-config
          nix build ".?submodules=1#package-portable-tarball" --out-link result-portable -L --accept-flake-config
      # Upload native debug info so Sentry can symbolicate release minidumps. Skipped gracefully when
      # SENTRY_AUTH_TOKEN is absent (fork / secret-less run). The SHIPPED binaries stay stripped: the
      # Rust debug files come from the dedicated, upload-only `release-symbols` profile (unstripped +
      # line tables), and the C++ debug info from the RelWithDebInfo + separateDebugInfo app lane.
      - name: Upload debug symbols to Sentry (Linux)
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        run: |
          set -euo pipefail
          # Rust: build the symbol-only variant (does NOT alter the stripped release artifacts above).
          nix develop ./daemon-node --command \
            cargo build --profile release-symbols -p daemon -p daemon-infer
          nix shell nixpkgs#sentry-cli --command \
            sentry-cli debug-files upload --include-sources daemon-node/target/release-symbols
          # C++ (daemon-app + co-located crashpad_handler): upload the ELF/DWARF from the built app
          # closure. TODO(human): once the daemon-app flake exposes a RelWithDebInfo `-sym` output,
          # point this at it; sentry-cli matches debug files to the stripped binaries by build-id.
          nix shell nixpkgs#sentry-cli --command \
            sentry-cli debug-files upload --include-sources result-linux || \
            echo "note: no unstripped C++ debug info in result-linux; wire the app -sym output"
      - name: Stage dist/
        run: |
          set -euo pipefail
          version="$(cat VERSION)"
          mkdir -p dist
          # deb / rpm / AppImage keep their CPack names (their .sha256/.zsync sidecars reference
          # those exact names — renaming would invalidate them). Copy the whole output so ALL
          # sidecars (.sha256, .zsync, and .glibc if a build ever emits one) come along.
          cp -vL result-linux/* dist/
          # The portable tarball is unversioned in-store; give it a versioned name (no sidecar to
          # invalidate). Keeps the x86_64 token so release-manifest.sh records arch correctly.
          cp -vL result-portable/daemon-portable-x86_64.tar.zst \
            "dist/daemon-portable-${version}-x86_64.tar.zst"
          ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/
          if-no-files-found: error

  # Windows NSIS installer (MinGW cross; no Windows runner needed).
  windows:
    runs-on: ubuntu-latest
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: daemon-ai
      SENTRY_PROJECT: daemon
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v15
        with:
          name: daemon-ai
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build Windows NSIS installer
        run: nix build ".?submodules=1#package-nsis" --out-link result-nsis -L --accept-flake-config
      # Windows debug info. The MinGW lane uses the breakpad backend (Crashpad needs MSVC — see
      # docs/crash-reporting.md), so minidumps symbolicate against the cross-built binaries' DWARF.
      # Skipped gracefully without the secret.
      - name: Upload debug symbols to Sentry (Windows)
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        run: |
          set -euo pipefail
          # Rust (windows-gnu) symbol-only build; shipped .exe stays stripped.
          nix develop ./daemon-node --command \
            cargo build --profile release-symbols --target x86_64-pc-windows-gnu -p daemon -p daemon-infer || \
            echo "note: verify the windows-gnu target is available in the node devShell"
          nix shell nixpkgs#sentry-cli --command \
            sentry-cli debug-files upload --include-sources daemon-node/target/x86_64-pc-windows-gnu/release-symbols || true
          # C++ (daemon-app.exe + the breakpad-linked worker): upload the PE/DWARF from the built
          # installer tree. TODO(human): wire the app -sym output for the cross build.
          nix shell nixpkgs#sentry-cli --command \
            sentry-cli debug-files upload --include-sources result-nsis || \
            echo "note: no unstripped C++ debug info in result-nsis; wire the app -sym output"
      - name: Stage dist/
        run: |
          set -euo pipefail
          mkdir -p dist
          # CPack names the installer daemon-<ver>-win64.exe; keep it (its .sha256 sidecar, if
          # present, references that name).
          cp -vL result-nsis/daemon-*-win64.exe dist/
          cp -vL result-nsis/daemon-*-win64.exe.sha256 dist/ 2>/dev/null || true
          ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/
          if-no-files-found: error

  # Thin mobile/web clients: the debug-signed APK (arm64-v8a) and the WASM browser bundle.
  android-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v15
        with:
          name: daemon-ai
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build APK + WASM bundle
        run: |
          nix build "./daemon-app#apk" --out-link result-apk -L --accept-flake-config
          nix build "./daemon-app#wasm" --out-link result-wasm -L --accept-flake-config
      - name: Stage dist/
        run: |
          set -euo pipefail
          version="$(cat VERSION)"
          mkdir -p dist
          # The APK is debug-signed by design (ephemeral keystore; daemon-app/nix/android.nix).
          # Keep the arm64-v8a token so release-manifest.sh records arch=aarch64 rather than unknown.
          cp -vL result-apk/*.apk "dist/daemon-app-${version}-android-arm64-v8a-debug.apk"
          # WASM is delivered by the browser (update dial = None), so it ships as a downloadable
          # release asset but release-manifest.sh deliberately excludes any *-wasm.tar.* from the
          # feed (see its classify()). .tar.gz keeps it plainly a source-of-truth archive.
          tar -C result-wasm/share/daemon-app/wasm -czf "dist/daemon-app-${version}-wasm.tar.gz" .
          ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: android-wasm
          path: dist/
          if-no-files-found: error

  # macOS DMG (aarch64-darwin). `package-dmg` IS wired now (the superproject bundledDmg ->
  # daemon-app's static-Qt macos-dmg; see flake.nix), so this builds the real drag-and-drop .dmg.
  # Gated on the repo variable ENABLE_MACOS_RELEASE=true (deliberately a repo-var gate, not
  # `if: false`, so enabling is a settings change and actionlint stays clean).
  #
  # Runner selection — GH-hosted by default, self-hosted opt-in:
  #   - Default: GitHub-hosted `macos-14` (Apple Silicon). Nix is installed on the fly and the
  #     daemon-ai cachix substituter is used; the FIRST uncached run rebuilds static Qt from
  #     source (hours) — seed the cache by pushing a build from the M1 mini first.
  #   - Override: set the repo variable MACOS_RUNNER to a JSON label array, e.g.
  #     ["self-hosted","macOS","ARM64"], after registering the M1 mini as a self-hosted runner
  #     (Settings -> Actions -> Runners). Cap the mini via its nix.conf (max-jobs = 1, cores = 4);
  #     this job also pins --max-jobs 1 --cores 4 for the 8 GB box. The nix-installer/cachix
  #     steps auto-skip on self-hosted (nix + warm store already there).
  macos:
    if: ${{ vars.ENABLE_MACOS_RELEASE == 'true' }}
    runs-on: ${{ fromJSON(vars.MACOS_RUNNER || '"macos-14"') }}
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: daemon-ai
      SENTRY_PROJECT: daemon
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # GH-hosted runners start bare; the self-hosted mini already has nix + a warm store.
      - uses: DeterminateSystems/nix-installer-action@main
        if: ${{ runner.environment == 'github-hosted' }}
      - uses: cachix/cachix-action@v15
        if: ${{ runner.environment == 'github-hosted' }}
        with:
          name: daemon-ai
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build macOS DMG
        run: |
          # Sealed bundle lane, capped hard for the 8 GB mini (resource discipline: never a bare
          # -j/$(nproc); one build at a time). nice keeps the shared host responsive.
          nice -n 19 nix build ".?submodules=1#package-dmg" \
            --accept-flake-config --max-jobs 1 --cores 4 -L --out-link result-dmg
      # Upload native debug info so Sentry can symbolicate release minidumps (macOS crashpad
      # backend). Skipped gracefully when SENTRY_AUTH_TOKEN is absent (fork / secret-less run). The
      # SHIPPED binaries stay stripped: the Rust debug files come from the dedicated, upload-only
      # `release-symbols` profile (unstripped + line tables), never packaged.
      - name: Upload debug symbols to Sentry (macOS)
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        env:
          # Cap cargo too (native aarch64-darwin build on the 8 GB mini).
          CARGO_BUILD_JOBS: "4"
        run: |
          set -euo pipefail
          # Rust (aarch64-apple-darwin): build the symbol-only variant; does NOT alter the stripped
          # release binaries the DMG bundles.
          nice -n 19 nix develop ./daemon-node --command \
            cargo build --profile release-symbols -p daemon -p daemon-infer
          nix shell nixpkgs#sentry-cli --command \
            sentry-cli debug-files upload --include-sources daemon-node/target/release-symbols
          # C++ (daemon-app + the co-located crashpad_handler): upload any DWARF/dSYM from the built
          # DMG closure. The static-Qt DMG ships stripped, so this is best-effort until the app flake
          # exposes a dSYM output. TODO(human): point this at a daemon-app -sym/dSYM output.
          nix shell nixpkgs#sentry-cli --command \
            sentry-cli debug-files upload --include-sources result-dmg || \
            echo "note: no unstripped C++ debug info in result-dmg; wire the app dSYM output"
      - name: Stage dist/
        run: |
          set -euo pipefail
          version="$(cat VERSION)"
          mkdir -p dist
          # The static DMG is named daemon-app-<appver>.dmg in-store; republish it with the product
          # version + an arch token so release-manifest.sh records arch=aarch64 (its arch_of() parses
          # the name). Regenerate the .sha256 for the republished name rather than copying the
          # in-store sidecar (which references the old name).
          dmg="$(ls result-dmg/*.dmg)"
          out="daemon-${version}-macos-arm64.dmg"
          cp -vL "$dmg" "dist/${out}"
          ( cd dist && shasum -a 256 "${out}" > "${out}.sha256" )
          ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/
          if-no-files-found: error

  # Assemble every artifact, generate + sign the update feed, and publish the GitHub Release.
  # `macos` is in `needs` so publish waits for the DMG WHEN that job runs, but the
  # `!failure() && !cancelled()` guard lets publish proceed when the macos job is SKIPPED
  # (ENABLE_MACOS_RELEASE unset) — a skip is neither a failure nor a cancellation. The bulk
  # download-artifact step below then simply picks up whatever artifacts exist (the DMG when the
  # macos job produced one), so a skipped macos lane never blocks a Linux/Windows/mobile release.
  publish:
    needs: [linux, windows, android-wasm, macos]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: daemon-ai
      SENTRY_PROJECT: daemon
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v15
        with:
          name: daemon-ai
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Download all build artifacts into dist/
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Verify tag matches VERSION
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail
          # scripts/release.sh cuts strictly `vX.Y.Z` tags (VERSION is SemVer core). A manually cut
          # prerelease tag (e.g. v0.0.2-rc.1) is allowed: strip the prerelease suffix before
          # comparing its core to VERSION.
          tag_core="${GITHUB_REF_NAME#v}"
          tag_core="${tag_core%%-*}"
          file_version="$(cat VERSION)"
          if [ "$tag_core" != "$file_version" ]; then
            echo "tag core ($tag_core) does not match VERSION ($file_version)" >&2
            exit 1
          fi
          echo "tag ${GITHUB_REF_NAME} matches VERSION ${file_version}"
      - name: Generate + sign the release feed (manifest.json) and SHA256SUMS
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail
          version="$(cat VERSION)"
          notes_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
          # Materialize the signing key with a private umask; never printed.
          umask 077
          keyfile="${RUNNER_TEMP}/minisign.key"
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$keyfile"
          export MINISIGN_SECRET_KEY_FILE="$keyfile"
          # jq + minisign from nixpkgs; coreutils (sha256sum/stat/date) also present on the runner.
          nix shell nixpkgs#jq nixpkgs#minisign nixpkgs#coreutils --command \
            bash daemon-app/scripts/release-manifest.sh dist "$version" stable \
              --notes-url "$notes_url"
          rm -f "$keyfile"
          # Checksums over everything staged (manifest + .minisig included; SHA256SUMS itself is
          # written after the glob is expanded, so it is not listed in its own file).
          ( cd dist && sha256sum -- * > ../SHA256SUMS && mv ../SHA256SUMS ./SHA256SUMS )
          ls -la dist/
      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Prerelease when the tag carries a SemVer prerelease suffix (contains a '-').
          prerelease=()
          case "${GITHUB_REF_NAME}" in
            *-*) prerelease=(--prerelease) ;;
          esac
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --verify-tag \
            --title "daemon ${GITHUB_REF_NAME}" \
            --generate-notes \
            "${prerelease[@]}"
      # Finalize the Sentry releases so the uploaded debug files (from the linux/windows jobs) are
      # associated with a resolvable release. The release strings match the ones compiled/derived in
      # the app + node crash init (`daemon-app@<ver>` / `daemon-node@<ver>`). Skipped gracefully
      # without the secret (fork / secret-less run).
      - name: Finalize Sentry releases
        if: ${{ github.ref_type == 'tag' && env.SENTRY_AUTH_TOKEN != '' }}
        run: |
          set -euo pipefail
          app_version="$(cat daemon-app/VERSION)"
          node_version="$(cat daemon-node/VERSION)"
          for rel in "daemon-app@${app_version}" "daemon-node@${node_version}"; do
            nix shell nixpkgs#sentry-cli --command sentry-cli releases new "$rel"
            nix shell nixpkgs#sentry-cli --command sentry-cli releases finalize "$rel"
          done
