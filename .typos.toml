# typos config for the daemon superproject (used by `just spell` and the pre-commit hook).
# Subdirectories inherit this file, so it covers daemon-node and daemon-app too.

[files]
extend-exclude = [
  # Vendored third-party clones and build/codegen output - not ours to spell-check.
  "daemon-node/research/**",
  "**/target/**",
  "**/build*/**",
  "**/result-*/**",
  # `**/`-prefixed so they match whether typos walks from the superproject root or
  # crosses into the daemon-app submodule (which resets paths to the submodule root).
  "**/src/core/daemon/codec/generated/**",
  "**/src/core/daemon/codec/vendor/**",
  # Vendored Monocypher (minisign verification) + updater vendor tree: upstream
  # spellings ("publically", "cannonical") are not ours to fix.
  "**/src/core/update/vendor/**",
  "**/src/tools/updater/vendor/**",
  # Vendored flatpak-builder-tools cargo generator (pinned upstream script):
  # upstream typos ("fragement") are not ours to fix.
  "**/packaging/flatpak/tools/**",
  # Generated cargo vendoring manifest (crate names + sha256s), not hand-authored.
  "**/packaging/flatpak/cargo-sources.json",
  "*.lock",
  # Shipped translation catalogs: the <translation> text is non-English by design
  # and would otherwise trip the spell gate. The English <source> lives in the
  # qsTr()/tr() literals, which are spell-checked as normal source. Mirrors the
  # daemon-app/typos.toml exclude so the submodule-bump gate agrees.
  "**/i18n/daemon-app_*.ts",
]

# Domain terms / library names / valid spelling variants / short identifier fragments that typos
# misreads as errors (each verified a false positive in this codebase).
[default.extend-words]
invokable = "invokable"     # Qt's Q_INVOKABLE macro
cose = "cose"               # COSE: CBOR Object Signing and Encryption
tpe = "tpe"                 # common `type` placeholder identifier
unparseable = "unparseable" # accepted variant of "unparsable"
clonable = "clonable"       # accepted variant of "cloneable"
togglable = "togglable"     # accepted variant of "toggleable"
lod = "lod"                 # LOD: level-of-detail (e.g. m_lodTier)
muc = "muc"                 # MUC: XMPP multi-user chat
secur = "secur"             # Secur32.dll: the Windows SSPI system library
seh = "seh"                 # libgcc_s_seh-1.dll: the MinGW SEH unwinder runtime (bundled worker)
cpy = "cpy"                 # NSIS StrCpy instruction (per-user NSIS template patch)
flate = "flate"             # the flate2 crate (DEFLATE), mirrors daemon-node/typos.toml
wronly = "wronly"           # rustix `OFlags::WRONLY` (O_WRONLY) in daemon-core exec/contained.rs
arange = "arange"           # numpy np.arange in skill examples
canva = "canva"             # Canva (product name)
grammers = "grammers"       # the `grammers` Telegram MTProto crate family (daemon-telegram), mirrors daemon-node/typos.toml
scaned = "scaned"           # WeChat iLink QR wire status value (server's own spelling), mirrors daemon-node/typos.toml
eis = "eis"                 # EIS: KWin's Emulated Input Server (libei) input backend (kwin-mcp)
# Short fragments typos extracts from larger identifiers/words/fixtures (PNGs, MorAlekss, ...).
nd = "nd"
ot = "ot"
pn = "pn"
ba = "ba"
thm = "thm"
thi = "thi"
dout = "dout"
mis = "mis"
assum = "assum"
slee = "slee"
selec = "selec"
hel = "hel"
mor = "mor"
alikes = "alikes"

[default.extend-identifiers]
ratatui = "ratatui"         # the Rust TUI crate
Ratatui = "Ratatui"
